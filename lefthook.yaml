pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings
    test:
      run: cargo test --all --no-fail-fast
pre-push:
  commands:
    test:
      run: cargo test --all --no-fail-fast
